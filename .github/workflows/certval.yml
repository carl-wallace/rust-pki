name: certval

on:
  pull_request:
  push:
    branches: main

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - 1.85.0 # MSRV
          - stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: RustCrypto/actions/cargo-hack-install@master
      # the UI crates are excluded: the dioxus 0.7 dependency tree requires rustc >= 1.88
      # (home/built/image/time), above the 1.85 MSRV here, and pittv3-gui additionally needs
      # Linux system packages (libwebkit2gtk-4.1-dev, libgtk-3-dev, libxdo-dev) absent from
      # the runner; re-include as the desktop work stabilizes
      - run: cargo hack build --each-feature --workspace --exclude pittv3-gui --exclude pittv3_gui_lib --exclude pittv3-wasm

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - 1.85.0 # MSRV
          - stable
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: RustCrypto/actions/cargo-hack-install@master
      # see build job note: UI crates excluded (dioxus tree MSRV + system packages)
      - run: cargo hack test --each-feature --workspace --exclude pittv3-gui --exclude pittv3_gui_lib --exclude pittv3-wasm

  x509-limbo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable 
      - run: make -C support/x509-limbo-tests
      # You are expected to checkin the result in the repository
      - run: git diff --exit-code support/x509-limbo-tests/rust-certval.json
