<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The document is unhashed and points at content-hashed js/wasm; always revalidate it so a
         redeploy is picked up without a manual cache clear. The vhost Cache-Control header is the
         authoritative control; this meta is a belt-and-suspenders fallback. -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <title>PITTv3 — PQC certification path validation in WASM</title>
    <link data-trunk rel="rust" data-bin="pittv3-wasm" data-wasm-opt="z" />
  </head>
  <body>
    <div id="main"></div>
  </body>
</html>
